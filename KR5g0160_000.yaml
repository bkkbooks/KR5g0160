front:
  text: 洞眞太上飛行羽經九眞昇玄上記内十
  hash: sha256:0d42b98b8173311b31cab6f7134ca8585e22e31dd033e9a326060016a6b42c21
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0160_HFL_000-001a, image: hfl/1033/1033-084.png}
body:
  text: 一名上清太上逥元九道飛行羽經太上大道若昔受飛行羽經九眞昇玄上記寳言紫文録金之字超虚躡空浮景之道於玉清上宫虚皇髙眞道君於是太上大道君以其要傳上清玉帝君君以傳上元太素君太素君又傳太㣲天帝君君施行眞祕以傳晨中黄景君君以傳皇𥘉紫靈君君以傳中央黄老君以傳九㣲太太眞玉保王金闕上相大司命髙晨師青童太君梵湄使以此文教授當爲眞人者也諸有太素絳録及金簡刻名皆當得見此文自非其人不與相遇欲出傳之者必須精應感激乃付之耳㰱盟㫁金誓以不宣之信矣有此經者太素三元君遣玉童二十四人玉女二十四人侍書之左右糺剌泄慢之愆衞護有書者身此太上中眞之道也非次第之中也蓋中和之中眞矣配簡三元名刋太素行則紫旄之節駕則八景錦輿前從萬靈後從千眞九鳳齊嘯天鈞唱弦神龍啓道五帝叅軒飛行太空遨宴丹霄位爲上清眞人玉卿之師諸有太上飛行羽經昇玄九眞者聽三千年六傳遇其人一日頓授之若無可授者三千年限盡以朱素寫六通封之峩眉山金臺之室過此不復傳出不可授而傳者泄眞人之道也受而不承科者毀眞人之誓也授者經師受者盡宗焉違書慢犯宣露寳文者七祖父母詣玄都受風刀之栲身爲下鬼幽之夜河欲受飛行散金爲盟欲知仙忌文巾爲志旣知羽書天地同符子聞玄文超駕慶雲此之謂也出委羽洞臺刻名太素三元君有言曰仙人始知廕庇斗星之道而未知眞人藏斗精之法夫九斗者天樞之正蓋玄𨋙之華寳機紐八維總旋九度迴廕圎方運攝和氣理調隂陽司適無外夫斗星之玄曜二暉爲之夜翳璇璣動用四象爲之流墜玄明合煥威光共蔚矣太帝君有言曰仙人徒知咀嚼隂陽吐納二氣而不知斗星是隂陽之根府二象之玄綱也乃苦辛玩其波末而不識營始而甚易廕其枝條而失乎根本矣何不心藏九斗陶冶二象耶行之十四年太上迎以瓊輪超虚躡空上登上清列爲上眞反神嬰顔衆神侍軒青童大君有言曰仙人徒知璇璣大威煥曜萬辰覩九道之流共玩貟動以攝神庇之以來大度用之以求神仙而猶不識迴九氣以内照藏明斗於泥丸於是魂凝魄練合德靈煙解其道上昇上清得其道身爲上眞是以眞人抱大象以匿霞包斗精以藏身我先師是故左駕緑雲右轡絳晨身昇太素超虚躡空存斗星紫色其剛赤色覺紫色之炁温暖也存星大小意行之此青童君口訣昔栢成子谷希子廣成子青眞子各存斗星之炁並與身共入蓮實之中忽見蓮内有千里金池玉山萬頃宫臺宇室蓋亦連雲朱木結實紫華生園碧輦玄黄三素八輪竒異之觀不可名字四子遨逰經時旋宴極盻而反當是之時不覺蓮實之中央也所謂以大投小變化无蹤此存星之極感闊狹之標致也乃可豪杪爲八海何蓮實之足妙哉以月一日三日及五日禺中時夜半時唯一時也入室正坐北向接手定氣臨目畢乃存北斗九星來下入頭泥丸中以柄杓前指魁偃向上也良久忽見斗魁中有一大神人衣服名字如祝所言極久頭中當小熱温然也此是上元九精眞氣來入故暖異以告驗熱感之休應也方乃嚥液五十過叩齒九通畢舉左手第三指捻兩眉中央於是㣲祝曰太上紫暉九道之尊華蓋七落迴曜萬晨動御髙靈静和景雲隂陽流灌二炁中分旋濟無外煥朗衆天令月啓牙來登泥丸元精結感化爲大神名曰竒紐厥字靈綱正坐中斗遊我明堂鳳羽紫帔虎錦丹裳左帶玉佩右腰金璫手把流鈴頭巾晨光吐炁漑精泥丸以康魂魄凝和植華柱梁使我飛仙超虚躡空上造上清策虎命龍北朝玉帝瓊琳上宫西謁太素稽首三元祝畢又嚥津三十過叩齒九通又祝如前畢起北向再拜西向再拜拜畢乃不復臨目事訖矣諸寢静之室牀上行之可也拜亦不下地也夫真人作法所貴於安其所安崇妙簡㣲不復曲折敗常乖乎宿處也要道不煩要領絶倫矣後施三祝之法皆依俙象此行也但祝不同及存星有背向之異耳要言在於宻房曲室勿令有見其存思也所以爾者存思時玉童玉女將在側而鑒焉又不可弔喪臨尸經穢淹邪衣被巾履一切勿錯越以假借於非類矣何謂類邪同志契者是也非我同好不與同席而坐非我同盟不與同牢而食道俗以殊有崇奉六天及事山川魔神者不居其室不饗其饌勿著其衣勿冠其巾蓋避其尸穢之下氣遏其邪風之徃來也此所謂眞道之眞道矣精妙之精妙也若能爲其妙乃得其眞能避其穢乃獲其新若將混沌雜棲臭香齋噐不標其神不整其氣滛貞同牢貪㢘共位厠邪風而不蕩心履塵壤而不思超邁者以此尋眞眞爲無也夜光不生於糞井下才不植乎標嶺此之謂也精感彷彿靈應機㣲玉華告驗神光表暉自非爾師勿言之也斗中大神者蓋九星之精因感變而忽生矣是施行時當心存名字至後祝日止後祝自復有神又存如𥘉若是泥丸中星神𢘆存居其中毎事效此爲象存斗星來下令極思不覺忽然巳在我形中也𥘉存或未應彷彿但極思念之如已在形中亦足致感久久自漸入妙月七日九日十二日禺中時若夜半時入室正坐接手定氣臨目畢乃存北斗九星來下入心中似柄杓竪仰向喉魁中向外也良久忽然見魁中有一大神衣服名字如祝所言極久當有覺心中温暖眞氣來入也乃嚥津五十過叩齒九通舉右手第二指以捻心於是乃㣲祝曰太上紫眞九氣中靈包括萬度璇璣煥明飛霞流暉曜燭玉清玄蓋衆辰隂陽判成四和交降七緯順生肇月吉辰來映心庭流光落景中元充盈六府啓關華液泯平魂魄制練得眞之精感至𧢻變億化立成忽見大神坐安心房整氣朝津百節流通攀斗據魁盻邈百方其名璇度厥字素康緑羽華帔龍帶虎裳身生寳曜項負圎光首建飛晨扶冠低昻使我飛仙超浮太空上造紫闕北朝玉皇役使萬神衆靈奉迎心上生華慶雲永昌鳳嘯泠泠鸞吹鏘鏘祝畢嚥津三十過叩齒九通又祝如前祝畢起向南再拜事畢此也畢乃開目月十五日十九日二十三日禺中時若夜半時入室正坐接手定氣臨目畢乃存北斗九星來下入臍中三寸下元宫中以斗柄杓竪仰向心魁中向外極久忽見魁中有一大神衣服名字如祝所言亦當覺臍中温温熱眞氣來至也乃嚥津六十過叩齒九通使舉左手第三指以捻鼻下人中於是乃㣲祝曰太上紫皇煥朗中樞九瑋炳藹光秀太霞萬靈仰鎮千晨植牙七度用明九煙芬葩制陽表順執隂以和眞暉啓陣玄根總羅肇月惟吉觀映臍内紫氣發霄飛光縱墜練我魂魄華津縈蔚忽見大神上宫靈貴名曰𢪨萌厥字流𣡡正坐齊中乘斗九氣吐納雲液平血理胃黄鳳羽帔龍衣虎帶手啓日根頭戴緑符腰生流火煥電映無使我飛仙超空躡浮上造玉房𢹂帶霄虚役使萬神天地同休祝畢又嚥津三十過叩齒九通又祝如前祝畢起向本命再拜拜畢開目行下元之道畢矣凡舉手有所捻是臨祝之時耳祝畢接手如𥘉八節日夜半時入室正坐接手定氣閉目内視乃存一身冉冉起上飛昇北斗魁中良久爲之如覺我形已在斗中也極念爲之當聞體中熱是眞炁合德也又存九精三大神名字服色貌如嬰兒之始生也三神與我對坐我心拜之焉精想彷彿遺形眇眇將今怳惚也乃嚥津八十過叩齒九通舉左手以撫心乃㣲祝曰太上丹靈玄光飊煥九瑋啓璇暉炁澄散紫晨幽燭七曜蔚粲二景奏明隂陽以判四度用昌雲津迴灌八節啓炁上昇九元據斗攀綱奉見三神問我稽留何不昇仙我即稽首畏鬼以前帝乃赫然口銜日根左破六天右蹙酆山流鈴上煥萬魔碎分遂和我魄強我三魂藏斗内曜九精在心紫霞洞映飛光萬尋和魂制魄六腑滌練精感變躍玉妃忽見坐當我心俯視仰盻其名宻華厥字鄰蒨吐納朱炁和平百關身服錦帔鳳光鸞裙腰帶虎録龍章玉文手執月華建以日冠騰躍太霄駕景蓋雲書名太素我得飛仙超浮空同乘瓊太元上造朱房役使萬神紀均二度還反嬰顔北帝激電南帝火陳東倉啓燭赫赫雷震西流𩀱抃鳴音唱鈞四舉超躍薦我玉眞遂乘八景遨宴九煙祝畢又嚥津三十過叩齒九通復祝如前祝畢起向西北再拜畢開目行八節之眞畢矣此道是超空之祕妙九眞之竒法三叚行眞月用九日故謂之九眞昇玄文此太上禁書内寳爲眞之要訣也若得其人當傳之時受者當清齋百日或三十日或十日任意造其所適矣又當先告齋一日以洗素心授者對齋如受者焉付與之日先歃血累壇剪髮立盟爲不宣泄之信誓也後聖以㰱血犯生氣之傷剪髮違膚毀之犯謹以黄金二鎰代割血之信青柔之帛三十二尺當割髮之約師受誓物不得散爲私利藉以濫用皆當施山棲髙隱單侣貧道若超騰步虚或投之於山室散之靈巖所以爾者明天信貴束誓測道精賤愛育也不奉科約生死七祖父毋受玄都風刀之考身爲下鬼傳授年限出授節度如上法當謹按之盟物皆精上也啓心肅整坦誠單允靡有不盡也受書則宗也授書則經師也聞道則仰範標模求生則存匠生地不遵所奉闕略違慢者三祖獲刑於火官身生業疾軒轅師荆山丈人丈人但解鍊石之道無他妙也豈賢於縉雲哉軒轅鲁問其鍊石道故遂師焉荊山丈人是姬幽子也今在委羽山能鍊石成水煎水成玉粉玉爲散以石水服之能知其道與天同存然不能飛行虚空手把晨霞也錬石雖妙固小術耳右太上飛行羽經九眞昇玄上記其道畢矣其下弓是太上九眞中經書雖有上下序訣然別法異用不相干也中央黄老君分以傳太虚眞人與八道祕言相次九眞中經在人間施行亦有口訣本文似祕不書也今請言之第一眞法當以五月五日十五日二十五日二十七日二十九日一月之中五過行之耳皆以平旦第二眞法當以八月八日十一日十四日十九日二十三日二十七日一月之中六過行之耳皆以辰時第三眞法當以六月六日七日十七日十八日二十五日二十六日一月之中六過行之耳皆以已時第四眞法當以正月二日八日十四日十八日十九日二十八日一月之中六過行之耳皆以午時第五眞法當以三月三日八日十三日二十日二十六日一月之中五過行之耳皆以未時第六眞法當以七月七日十一日十四日十八日二十三日二十五日二十八日一月之中七過行之耳皆以申時第七眞法當以十一月二日六日九日十三日十六日十九日二十三日二十七日一月之中八過行之耳皆以申時或酉時第八眞法當以二月二日七日九日十五日十八日十九日二十七日一月之中七過行之耳皆以戌時或亥時第九眞法當以十二月三日九日十七日十九日二十六日二十九日一月之中六過行之耳皆以子時右行九眞中經口訣畢矣此月此日皆是合眞迴順生炁攝精之時善可以存思易致玄感若髙棲絶嶺潜摽雲巖斷人事於内外割粒食以清腸接手正心合手含晨皆當日日施行自如本經今之所書蓋人間多事不得日日清閑以行之也行之十四年亦超浮虚無能死能生出水入火上登上清五藏生華與天相傾其昇玄羽經上卷也行之三道一月九日蓋亦人間未及大靜之時若長齋久靜單景獨徃仰秀空洞心單事外者皆宜此日行之以次相續也一月九行施於人中耳八節昇斗中又存思忽見斗中玉妃在我前坐玉妃坐紫煙入我心中良久其衣服如八節所祝此女子是九精之隂靈玉清之上妃也出青童口訣洞眞太上飛行羽經九眞昇玄上記
